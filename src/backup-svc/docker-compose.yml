
version: '3.8'
services:
  db-backup:
    build: .
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    depends_on:
      - db
    restart: on-failure
    volumes:
      - db_data:/var/lib/postgresql/data
volumes:
  db_data:
    external: true

