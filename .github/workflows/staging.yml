---
name: Deploy to Staging

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy to staging'
        required: true
        default: 'main'

jobs:
  Test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch }}
      - name: Set up Python 3.9
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          python -m pip install pytest
          python -m pip install coverage
          pip install -r ./src/ws/requirements.txt
          pip install -r ./src/ts/requirements.txt
      - name: Run pytest with coverage
        run: |
          coverage run -m pytest
          coverage xml -o coverage.xml
        continue-on-error: true
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        with:
          name: coverage-report
          files: coverage.xml
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  Build:
    needs: Test
    runs-on: ubuntu-latest
    env:
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch }}
      - name: Create database.ini
        run: |
          echo "[postgresql]" > src/ws/database.ini
          echo "host=db" >> src/ws/database.ini
          echo "${{ secrets.PG_DB_NAME }}" >> src/ws/database.ini
          echo "${{ secrets.PG_DB_USER }}" >> src/ws/database.ini
          echo "${{ secrets.PG_DB_PASS }}" >> src/ws/database.ini
      - name: Create .env.prod
        run: |
          echo "# ws_worker container env variables" > .env.prod
          echo "${{ secrets.DEST_EMAIL }}" >> .env.prod
          echo "${{ secrets.SRC_EMAIL }}" >> .env.prod
          echo "${{ secrets.POSTGRES_PASSWORD }}" >> .env.prod
      - name: Show environment
        run: |
          cat /etc/os-release
          docker -v
          docker compose version
          python3 -V
          pip install boto3
      - name: Download DB backup from S3
        run: |
          python3 ./src/db/get_last_db_backup.py
          cp *.sql ./src/db
          ls -lh ./src/db | grep sql
      - name: Start DB container
        run: docker compose --env-file .env.prod up -d db
      - name: Verify DB import
        run: |
          sleep 20
          docker compose ps
          docker exec sslv_web_scraper-db-1 \
            psql -U new_docker_user -d new_docker_db -c '\dt+'
      - name: Start WS container
        run: docker compose --env-file .env.prod up -d ws
      - name: Start TS container
        run: docker compose --env-file .env.prod up -d ts
      - name: Verify all containers
        run: |
          sleep 10
          docker compose ps
      - name: Tear down
        run: docker compose down

  Deploy:
    needs: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 0
      - name: Compute release version
        id: version
        run: |
          git fetch --tags
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          COMMITS_SINCE=$(git rev-list "${LATEST_TAG}..HEAD" --count)
          if [ "$COMMITS_SINCE" = "0" ]; then
            echo "release_version=${LATEST_TAG}" >> "$GITHUB_OUTPUT"
          else
            MAJOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f1)
            MINOR=$(echo "$LATEST_TAG" | cut -d. -f2)
            PATCH=$(echo "$LATEST_TAG" | cut -d. -f3)
            NEXT_PATCH=$((PATCH + 1))
            echo "release_version=v${MAJOR}.${MINOR}.${NEXT_PATCH}-rc" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up SSH key
        run: |
          echo "${{ secrets.DEV_EC2_PRIVATE_KEY }}" > private_key
          chmod 600 private_key
      - name: Deploy to Staging EC2
        env:
          HOSTNAME: ${{ secrets.DEV_EC2_IP }}
          USER_NAME: ${{ secrets.DEV_EC2_USER }}
          DEPLOY_BRANCH: ${{ github.event.inputs.branch }}
          RELEASE_VERSION: ${{ steps.version.outputs.release_version }}
          APP_ENV: staging
        run: |
          ssh -o StrictHostKeyChecking=no -i private_key "${USER_NAME}@${HOSTNAME}" 'bash -s' <<EOF
            set -e
            echo "=== Stopping old containers ==="
            docker ps
            docker ps -aq | xargs docker rm -f || true
            docker images -q | xargs docker rmi -f || true
            echo "=== Old containers stopped ==="

            echo "=== Cloning repository ==="
            curr_time=\$(date +%Y%m%d-%H%M)
            folder_name="\${curr_time}-deploy"
            mkdir -p "\$folder_name" && cd "\$folder_name"
            git clone https://github.com/vfedotovs/sslv_web_scraper.git .

            echo "=== Checking out branch: ${DEPLOY_BRANCH} ==="
            git switch ${DEPLOY_BRANCH}

            echo "=== Loading secrets ==="
            source ./scripts/load_secrets.sh

            echo "=== Running setup ==="
            make setup

            echo "=== Injecting version and environment ==="
            export RELEASE_VERSION="${RELEASE_VERSION}"
            export APP_ENV="${APP_ENV}"
            sed -i '/^RELEASE_VERSION=/d; /^APP_ENV=/d' .env.prod
            echo "RELEASE_VERSION=${RELEASE_VERSION}" >> .env.prod
            echo "APP_ENV=${APP_ENV}" >> .env.prod
            echo "Shell env (what docker-compose actually uses):"
            env | grep -E '^(RELEASE_VERSION|APP_ENV)='
            echo ".env.prod values:"
            grep -E '^(RELEASE_VERSION|APP_ENV)=' .env.prod
            echo "Resolved docker-compose config:"
            docker compose --env-file .env.prod config | grep -E 'RELEASE_VERSION|APP_ENV' || true

            echo "=== Building containers ==="
            make build

            echo "=== Starting containers ==="
            make up

            echo "=== Verifying deployment ==="
            sleep 15
            docker ps
            echo "=== Staging deployment complete ==="
          EOF
