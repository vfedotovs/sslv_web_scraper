---
name: Deploy to Production

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '**.py'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'Makefile'
      - 'src/**'

jobs:
  Test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Set up Python 3.9
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          python -m pip install pytest
          python -m pip install coverage
          pip install -r ./src/ws/requirements.txt
          pip install -r ./src/ts/requirements.txt
      - name: Run pytest with coverage
        run: |
          coverage run -m pytest
          coverage xml -o coverage.xml
        continue-on-error: true
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        with:
          name: coverage-report
          files: coverage.xml
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  Deploy:
    needs: Test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Compute release version
        id: version
        run: |
          git fetch --tags
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          COMMITS_SINCE=$(git rev-list "${LATEST_TAG}..HEAD" --count)
          if [ "$COMMITS_SINCE" = "0" ]; then
            echo "release_version=${LATEST_TAG}" >> "$GITHUB_OUTPUT"
          else
            MAJOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f1)
            MINOR=$(echo "$LATEST_TAG" | cut -d. -f2)
            PATCH=$(echo "$LATEST_TAG" | cut -d. -f3)
            NEXT_PATCH=$((PATCH + 1))
            echo "release_version=v${MAJOR}.${MINOR}.${NEXT_PATCH}-rc" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up SSH key
        run: |
          echo "${{ secrets.PROD_M5_EC2_PRIVATE_KEY }}" > private_key
          chmod 600 private_key
      - name: Deploy to Production EC2
        env:
          HOSTNAME: ${{ secrets.PROD_M5_EC2_IP }}
          USER_NAME: ${{ secrets.PROD_USER_NAME }}
          RELEASE_VERSION: ${{ steps.version.outputs.release_version }}
          APP_ENV: production
        run: |
          ssh -o StrictHostKeyChecking=no -i private_key "${USER_NAME}@${HOSTNAME}" 'bash -s' <<EOF
            set -e
            echo "=== Stopping old containers ==="
            docker ps
            docker ps -aq | xargs docker rm -f || true
            docker images -q | xargs docker rmi -f || true
            echo "=== Old containers stopped ==="

            echo "=== Cloning repository ==="
            curr_time=\$(date +%Y%m%d-%H%M)
            folder_name="\${curr_time}-deploy"
            mkdir -p "\$folder_name" && cd "\$folder_name"
            git clone https://github.com/vfedotovs/sslv_web_scraper.git .

            echo "=== Loading secrets ==="
            source ./scripts/load_secrets.sh

            echo "=== Running setup ==="
            make setup

            echo "=== Injecting version and environment into .env.prod ==="
            sed -i '/^RELEASE_VERSION=/d; /^APP_ENV=/d' .env.prod
            echo "RELEASE_VERSION=${RELEASE_VERSION}" >> .env.prod
            echo "APP_ENV=${APP_ENV}" >> .env.prod
            echo "Final injected values:"
            grep -E '^(RELEASE_VERSION|APP_ENV)=' .env.prod

            echo "=== Building containers ==="
            make build

            echo "=== Starting containers ==="
            make up

            echo "=== Verifying deployment ==="
            sleep 15
            docker ps
            echo "=== Deployment complete ==="
          EOF
